<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>餐厅</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#E8758A;--b:#F8F8FA;--c:#FFF;--t:#1A1A2E;--s:#8E8EA9;--bd:#F0F0F5}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:#E8EAEF;display:flex;justify-content:center;min-height:100vh}
.p{width:375px;height:812px;background:var(--b);border-radius:32px;overflow:hidden;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.15);display:flex;flex-direction:column}
.tc{display:none;flex:1;overflow-y:auto;min-height:0}
.tc.a{display:flex;flex-direction:column}
.hd{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between;background:var(--b);flex-shrink:0;z-index:10}
.loc{display:flex;align-items:center;gap:6px}
.loc .ct{font-size:16px;font-weight:600;color:var(--t);cursor:pointer}
.loc .sw{font-size:13px;color:var(--p);cursor:pointer}
.tabs{display:flex;border:1.5px solid var(--p);border-radius:20px;overflow:hidden}
.tab-btn{padding:6px 18px;border:none;background:transparent;color:var(--s);font-size:13px;cursor:pointer;font-weight:500;font-family:inherit;transition:all .2s}
.tab-btn.a{background:var(--p);color:#fff}
.sb{margin:8px 16px;position:relative;flex-shrink:0}
.sb input{width:100%;padding:10px 14px 10px 36px;border:1px solid var(--bd);border-radius:12px;font-size:14px;background:var(--c);outline:none}
.sb input:focus{border-color:var(--p)}
.sb::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px}
.tg{display:flex;gap:8px;padding:4px 16px 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tg::-webkit-scrollbar{display:none}
.tag{padding:6px 14px;border-radius:16px;font-size:13px;white-space:nowrap;cursor:pointer;border:1px solid var(--bd);background:var(--c);color:var(--s)}
.tag.a{background:var(--p);color:#fff;border-color:var(--p)}
.cl{padding:0 16px 12px;flex:1;min-height:0}
.cd{background:var(--c);border-radius:12px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.cd .ni{flex:1;min-width:0}
.cd .nm{font-size:15px;font-weight:600;color:var(--t);margin-bottom:4px}
.cd .mt{font-size:12px;color:var(--s);margin-bottom:3px}
.cd .ad{font-size:11px;color:var(--s);opacity:.7}
.cd .st{color:#F5A623}
.fb{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--bd);background:var(--c);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.fb.a{border-color:var(--p);background:#FFF0F3;color:var(--p)}
.bn{text-align:center;font-size:11px;color:var(--s);padding:12px 16px 8px;opacity:.7;flex-shrink:0}
.cp{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:none;align-items:flex-end;z-index:200;justify-content:center}
.cp.show{display:flex}
.cs{background:#fff;border-radius:16px 16px 0 0;padding:20px 16px;width:100%;max-width:375px}
.cs h4{font-size:16px;margin-bottom:16px;color:var(--t)}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cg button{padding:10px;border:1px solid var(--bd);border-radius:10px;background:var(--c);font-size:14px;cursor:pointer;color:var(--t)}
.cg button:active{background:#FFF0F3;border-color:var(--p)}
.to{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;z-index:300;pointer-events:none;max-width:320px;text-align:center}
.to.show{opacity:1}
.sa{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:32px;text-align:center}
.sd{font-size:28px;font-weight:700;color:var(--t);min-height:40px}
.ss{font-size:13px;color:var(--s);margin-bottom:24px}
.sr{display:none;margin-top:24px;width:100%}
.sr.show{display:block}
.rc{background:var(--c);border-radius:16px;padding:20px;box-shadow:0 4px 20px rgba(232,117,138,.15);border:2px solid var(--p)}
.rc .lb{font-size:13px;color:var(--s);margin-bottom:6px}
.rc .rn{font-size:22px;font-weight:700;color:var(--t);margin-bottom:16px}
.ra{display:flex;gap:10px}
.ra button{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.ra .ag{background:var(--p);color:#fff;border:none}
.ra .dn{background:none;border:1.5px solid var(--bd);color:var(--t)}
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:32px;text-align:center}
.es .i{font-size:52px;margin-bottom:16px}
.es h3{font-size:17px;color:var(--t);margin-bottom:8px}
.bp{background:var(--p);color:#fff;border:none;padding:12px 32px;border-radius:24px;font-size:15px;font-weight:600;cursor:pointer}
.bp:active{transform:scale(.96)}
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px}
.sp{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--p);border-radius:50%;animation:sk 1s linear infinite}
@keyframes sk{to{transform:rotate(360deg)}}
.ld p{font-size:14px;color:var(--s)}
</style>
</head>
<body>
<div class="p">
  <!-- Header with city selector and capsule tabs -->
  <div class="hd">
    <div class="loc">
      <span class="ct" id="cl">📍 北京</span>
      <span class="sw" id="sc">切换城市</span>
    </div>
    <div class="tabs">
      <button class="tab-btn a" data-t="1">转圈</button>
      <button class="tab-btn" data-t="2">附近</button>
    </div>
  </div>

  <!-- Tab 1: 转圈 (random picker) -->
  <div class="tc a" id="t1" data-t="1">
    <div class="sa">
      <div id="se"><div class="i">🎰</div><h3 style="margin-top:12px">去「附近」收藏餐厅，解锁随机选择</h3><button class="bp" style="margin-top:20px" id="gn">去附近逛逛 →</button></div>
      <div id="sc2" style="display:none">
        <div class="sd" id="sd">🍜 海底捞</div><div class="ss" id="ss">第一次约会的地方🍜</div>
        <button class="bp" id="sb">🎰 转一转</button><p style="margin-top:10px;font-size:11px;color:var(--s)" id="sn">从 1 家收藏中随机选</p>
        <div class="sr" id="srr"><div class="rc"><div class="lb">今天就去</div><div class="rn" id="rn"></div><div class="ra"><button class="ag" id="ag">再来一个</button><button class="dn" id="dn">就它了</button></div></div></div>
      </div>
    </div>
  </div>

  <!-- Tab 2: 附近 (nearby list) -->
  <div class="tc" id="t2" data-t="2">
    <div class="es" id="es">
      <div class="i">📍</div><h3>开启定位，发现身边好去处</h3>
      <button class="bp" id="al">允许定位</button><p style="margin-top:12px;font-size:13px;color:var(--s)">仅获取城市级位置，保护你的隐私</p>
    </div>
    <div class="ld" id="ld" style="display:none"><div class="sp"></div><p>正在定位你所在的城市...</p></div>
    <div id="lc" style="display:none">
      <div class="sb"><input type="text" placeholder="搜索餐厅名称" id="si"></div>
      <div class="tg" id="tg"><span class="tag a" data-c="all">全部</span><span class="tag" data-c="火锅">火锅</span><span class="tag" data-c="日料">日料</span><span class="tag" data-c="西餐">西餐</span><span class="tag" data-c="快餐">快餐</span><span class="tag" data-c="甜点">甜点</span></div>
      <div class="cl" id="cl2"></div>
      <div class="bn">数据来自高德，仅展示 2000m 内</div>
    </div>
  </div>

  <div class="cp" id="cp"><div class="cs"><h4>选择城市</h4><div class="cg" id="cg"></div></div></div>
  <div class="to" id="to"></div>
</div>
<script>
const D={
北京:[{i:1,n:'海底捞',c:'火锅',s:4.6,d:'500m',a:'朝阳区建国路88号',o:'第一次约会的地方🍜',f:1},{i:2,n:'鸟·炭火烧',c:'日料',s:4.5,d:'900m',a:'朝阳区三里屯路1号'},{i:3,n:'Shake Shack',c:'西餐',s:4.3,d:'1200m',a:'朝阳区国贸商城B1'},{i:4,n:'喜茶',c:'甜点',s:4.4,d:'300m',a:'朝阳区大悦城1层'},{i:5,n:'西贝',c:'西北菜',s:4.1,d:'800m',a:'朝阳区望京街9号'},{i:6,n:'杨国福',c:'快餐',s:4.2,d:'400m',a:'朝阳区建国路123号'},{i:7,n:'全聚德',c:'烤鸭',s:4.0,d:'1500m',a:'东三环中路1号'},{i:8,n:'文和友',c:'湘菜',s:4.7,d:'700m',a:'朝阳区工体北路58号'}],
上海:[{i:9,n:'小杨生煎',c:'快餐',s:4.5,d:'300m',a:'黄浦区南京东路3号'},{i:10,n:'外婆家',c:'杭帮菜',s:4.4,d:'600m',a:'徐汇区淮海中路99号'},{i:11,n:'鼎泰丰',c:'快餐',s:4.6,d:'450m',a:'静安区南京西路188号'},{i:12,n:'海底捞',c:'火锅',s:4.7,d:'800m',a:'浦东陆家嘴环路88号'},{i:13,n:'鮨一',c:'日料',s:4.8,d:'1000m',a:'静安区愚园路68号'},{i:14,n:'茶餐厅',c:'甜点',s:4.3,d:'500m',a:'黄浦区人民广场12号'}],
深圳:[{i:15,n:'点都德',c:'粤菜',s:4.5,d:'400m',a:'福田区深南大道1号'},{i:16,n:'陈鹏鹏',c:'潮汕菜',s:4.6,d:'550m',a:'南山区科技园路88号'},{i:17,n:'海底捞',c:'火锅',s:4.7,d:'700m',a:'福田中心城1层'},{i:18,n:'一楽拉面',c:'日料',s:4.4,d:'350m',a:'南山区海岸城3楼'},{i:19,n:'GAGA',c:'西餐',s:4.5,d:'600m',a:'福田卓悦中心'}],
成都:[{i:20,n:'小龙坎',c:'火锅',s:4.7,d:'500m',a:'锦江区春熙路88号'},{i:21,n:'蜀大侠',c:'火锅',s:4.6,d:'650m',a:'成华区建设路237号'},{i:22,n:'烤匠',c:'川菜',s:4.5,d:'400m',a:'武侯区天府大道66号'},{i:23,n:'小龙翻大江',c:'火锅',s:4.4,d:'900m',a:'锦江区红星路3段'},{i:24,n:'无名冒菜',c:'快餐',s:4.3,d:'300m',a:'青羊区西大街12号'}],
杭州:[{i:25,n:'外婆家',c:'杭帮菜',s:4.5,d:'400m',a:'西湖区延安路88号'},{i:26,n:'绿茶',c:'杭帮菜',s:4.3,d:'550m',a:'上城区解放路199号'},{i:27,n:'弄堂里',c:'杭帮菜',s:4.4,d:'700m',a:'拱墅区丽水路58号'},{i:28,n:'海底捞',c:'火锅',s:4.6,d:'800m',a:'滨江区江南大道222号'},{i:29,n:'新白鹿',c:'杭帮菜',s:4.4,d:'350m',a:'下城区武林路36号'}]
};
const CY=Object.keys(D);let cc='北京',fv={1:1},fc='all',sq='';
function st(n){
  const btns = document.querySelectorAll('.tab-btn');
  const tabs = document.querySelectorAll('.tc');
  btns.forEach(b => b.classList.remove('a'));
  tabs.forEach(c => c.classList.remove('a'));
  const btn = document.querySelector('.tab-btn[data-t="'+n+'"]');
  if(btn) btn.classList.add('a');
  const tab = document.getElementById('t'+n);
  if(tab) tab.classList.add('a');
  if(n===2) ust();
}
function $(x){return document.getElementById(x)}
function ts(m){const t=$('to');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function gfl(){let r=[...D[cc]];if(fc!=='all')r=r.filter(x=>x.c===fc);if(sq){const q=sq.toLowerCase();r=r.filter(x=>x.n.toLowerCase().includes(q)||x.c.includes(q))}return r}
function rc(){const l=$('cl2');l.innerHTML='';const d=gfl();if(!d.length){l.innerHTML='<p style="text-align:center;color:var(--s);padding:40px 0;font-size:13px">没有找到相关餐厅</p>';return}d.forEach(r=>{const f=fv[r.i];l.innerHTML+=`<div class="cd"><div class="ni"><div class="nm">${r.n}</div><div class="mt"><span class="st">★${r.s}</span> · ${r.d} · ${r.c}</div><div class="ad">${r.a}</div></div><button class="fb${f?' a':''}" data-i="${r.i}" data-n="${r.n}" data-o="${r.o||''}">${f?'♥':'♡'}</button></div>`});l.querySelectorAll('.fb').forEach(b=>b.onclick=()=>tf(b))}
function tf(b){const i=+b.dataset.i;if(fv[i]){delete fv[i];b.classList.remove('a');b.innerHTML='♡';ts('已取消收藏')}else{fv[i]=b.dataset.o||'1';b.classList.add('a');b.innerHTML='♥';ts('已收藏，可以在「转圈」中选它了')}ust()}
function sl(){$('es').style.display='none';$('ld').style.display='flex';setTimeout(()=>{$('ld').style.display='none';$('lc').style.display='flex';$('lc').style.flexDirection='column';rc()},800)}
function lc(c){cc=c;$('cl').textContent='📍 '+c;$('cp').classList.remove('show');$('lc').style.display='none';$('ld').style.display='flex';setTimeout(()=>{$('ld').style.display='none';$('lc').style.display='flex';$('lc').style.flexDirection='column';rc()},600)}
function ust(){const fk=Object.keys(fv).map(Number);if(!fk.length){$('se').style.display='block';$('sc2').style.display='none';return}$('se').style.display='none';$('sc2').style.display='block';const fi=fk[0];let fr=null;for(const c of CY){const f=D[c].find(r=>r.i===fi);if(f){fr=f;break}}if(fr){$('sd').textContent=fr.n;$('ss').textContent=fv[fi]!==1?fv[fi]:''}$('sn').textContent='从 '+fk.length+' 家收藏中随机选'}
function ds(){const fk=Object.keys(fv).map(Number);const af=[];fk.forEach(i=>{for(const c of CY){const r=D[c].find(x=>x.i===i);if(r){af.push({...r,o:fv[i]});break}}});if(!af.length)return;const d=$('sd'),b=$('sb');b.disabled=true;$('srr').classList.remove('show');const du=2500,n=af.map(r=>r.n),st=Date.now();(function cl(){const e=Date.now()-st;if(e<du){d.textContent=n[Math.floor(Math.random()*n.length)];setTimeout(cl,e<1500?80:200)}else{const w=af[Math.floor(Math.random()*af.length)];d.textContent=w.n;$('ss').textContent=w.o!==1?w.o:'';$('rn').textContent='🍽️ '+w.n;$('srr').classList.add('show');b.disabled=false}})()}
$('al').onclick=sl;
$('sc').onclick=()=>{const g=$('cg');g.innerHTML='';CY.forEach(c=>g.innerHTML+=`<button data-c="${c}">${c}</button>`);g.querySelectorAll('button').forEach(b=>b.onclick=()=>lc(b.dataset.c));$('cp').classList.add('show')};
$('cp').onclick=e=>{if(e.target.id==='cp')$('cp').classList.remove('show')};
$('tg').onclick=e=>{const t=e.target.closest('.tag');if(!t)return;$('tg').querySelectorAll('.tag').forEach(x=>x.classList.remove('a'));t.classList.add('a');fc=t.dataset.c;setTimeout(rc,150)};
$('si').addEventListener('input',e=>{sq=e.target.value;clearTimeout(window._w);window._w=setTimeout(rc,200)});
$('gn').onclick=()=>st(2);
$('sb').onclick=ds;
$('ag').onclick=()=>{$('srr').classList.remove('show');ds()};
$('dn').onclick=()=>{ts('就决定是它了！🍴');$('srr').classList.remove('show')};
document.querySelectorAll('.tab-btn').forEach(b => {
  b.onclick = () => st(parseInt(b.dataset.t));
});
ust();
</script>
</body>
</html>
