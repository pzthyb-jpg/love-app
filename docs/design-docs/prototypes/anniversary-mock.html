<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>纪念日 · 小皮爱情助手</title>
<style>
:root{
  --primary:#E8758A;--primary-light:#F4A5B5;--bg:#FFF0F3;--bg-card:#FFF;--text:#1D1D1F;--text-secondary:#86868B;
  --anniv-gold:#F4C765;--anniv-gold-light:#FCE4A8;--anniv-gold-bg:#FDF8E8;
  --anniv-color-anniversary:#F4C765;--anniv-color-birthday:#E8758A;--anniv-color-holiday:#A78BFA;--anniv-color-custom:#60A5FA;
  --anniv-today-shadow:0 0 0 2px #F4C765,0 4px 16px rgba(244,199,101,.25);
  --radius:16px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
html[data-theme=dark]{
  --bg:#1C1C1E;--bg-card:#2C2C2E;--text:#FFF;--text-secondary:#98989D;
  --anniv-gold:#D4A84B;--anniv-gold-light:#8B7535;--anniv-gold-bg:#2A2520;
  --anniv-today-shadow:0 0 0 2px #D4A84B,0 4px 16px rgba(212,168,75,.2);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:.3s}
.page{max-width:430px;margin:0 auto;padding:20px 16px 100px;position:relative}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.header h1{font-size:28px;font-weight:700;letter-spacing:-.5px}
.icon-btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--bg-card);color:var(--text);font-size:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer}

/* Anniversary Card */
.card{background:var(--bg-card);border-radius:var(--radius);padding:16px;margin-bottom:14px;border-left:4px solid var(--anniv-color-anniversary);box-shadow:0 2px 12px rgba(0,0,0,.06);transition:.3s;cursor:pointer;overflow:hidden}
.card.birthday{border-left-color:var(--anniv-color-birthday)}
.card.holiday{border-left-color:var(--anniv-color-holiday)}
.card.custom{border-left-color:var(--anniv-color-custom)}
.card.today{box-shadow:var(--anniv-today-shadow);background:var(--anniv-gold-bg);border-left-width:0;border:2px solid var(--anniv-gold)}
.card-top{display:flex;justify-content:space-between;align-items:center}
.card-info{flex:1}
.card-name{font-size:17px;font-weight:600;display:flex;align-items:center;gap:6px}
.card-date{font-size:14px;color:var(--text-secondary);margin-top:4px}
.card-days{font-size:26px;font-weight:700;color:var(--anniv-gold);text-align:right;min-width:110px}
.card-days small{font-size:13px;font-weight:400;color:var(--text-secondary)}
.expand{font-size:18px;transition:.3s;color:var(--text-secondary)}
.card.expanded .expand{transform:rotate(180deg)}
.card-detail{margin-top:14px;padding-top:14px;border-top:1px solid rgba(0,0,0,.06);font-size:14px;color:var(--text-secondary);line-height:1.7}
.card-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.btn-sm{padding:6px 14px;border-radius:20px;border:none;font-size:13px;cursor:pointer;font-weight:500}
.btn-edit{background:var(--bg);color:var(--text)}
.btn-delete{background:#FFF0F0;color:#E8758A}

/* Empty State */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.empty-icon{font-size:64px;opacity:.6}
.empty p{font-size:16px;color:var(--text-secondary);margin:16px 0 24px;line-height:1.6}

/* FAB */
.fab{position:fixed;bottom:calc(80px + var(--safe-bottom));right:calc(50% - 190px);width:52px;height:52px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:24px;box-shadow:0 4px 16px rgba(232,117,138,.4);cursor:pointer;z-index:10}

/* Dialog Overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.3s}
.overlay.show{opacity:1;pointer-events:auto}
.dialog{background:#fff;width:100%;max-width:430px;border-radius:20px 20px 0 0;padding:24px;max-height:85vh;overflow-y:auto}
.dialog h3{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:6px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:14px;font-weight:600;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #E5E5E5;font-size:15px;background:#FAFAFA;font-family:inherit}
.form-group textarea{resize:none;height:60px}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary)}
.type-options{display:flex;gap:8px;flex-wrap:wrap}
.type-btn{padding:8px 16px;border-radius:20px;border:1.5px solid #E5E5E5;background:#FAFAFA;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:.2s}
.type-btn.active{border-color:var(--primary);background:rgba(232,117,138,.08);color:var(--primary)}
.checks{display:flex;gap:12px;flex-wrap:wrap}
.check{display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer}
.checkbox{width:18px;height:18px;border-radius:4px;border:2px solid #ccc;appearance:none;cursor:pointer;position:relative}
.checkbox:checked{background:var(--primary);border-color:var(--primary)}
.checkbox:checked::after{content:"✓";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:12px;font-weight:700}
.dialog-actions{display:flex;gap:10px;margin-top:24px}
.btn{flex:1;padding:12px;border-radius:24px;border:none;font-size:15px;font-weight:600;cursor:pointer}
.btn-cancel{background:#F0F0F0;color:var(--text)}
.btn-save{background:var(--primary);color:#fff}

/* TabBar */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;justify-content:space-around;padding:8px 0;bottom:var(--safe-bottom);background:var(--bg-card);box-shadow:0 -2px 10px rgba(0,0,0,.06)}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--text-secondary);text-decoration:none;padding:4px 12px}
.tab.active{color:var(--primary)}
.tab i{font-size:22px}

/* Toast */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;opacity:0;pointer-events:none;transition:.3s;z-index:200}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="page">
  <!-- Tab 1: 列表 -->
  <div id="tab-list">
    <div class="header">
      <h1>🎂 纪念日</h1>
      <button class="icon-btn" onclick="toggleTheme()">🌙</button>
    </div>

    <!-- 有数据 -->
    <div id="list-content">
      <div class="card today" onclick="toggleExpand(this)">
        <div class="card-top"><div class="card-info"><div class="card-name">💕 恋爱纪念日</div><div class="card-date">2024-07-01</div></div><div class="card-days">365<small>天</small></div><div class="expand">▼</div></div>
        <div class="card-detail" style="display:none">
          在一起的第一天<br>提醒：提前 1/3/7 天<br>创建于：2025-01-01
          <div class="card-actions"><button class="btn-sm btn-edit" onclick="event.stopPropagation();showEditDialog()">编辑</button><button class="btn-sm btn-delete" onclick="event.stopPropagation();showDeleteDialog('恋爱纪念日')">删除</button></div>
        </div>
      </div>

      <div class="card birthday" onclick="toggleExpand(this)">
        <div class="card-top"><div class="card-info"><div class="card-name">🎂 小宝贝生日</div><div class="card-date">1998-03-15</div></div><div class="card-days">还有 15<small>天</small></div><div class="expand">▼</div></div>
        <div class="card-detail" style="display:none">
          每年都要好好庆祝 🎁<br>提醒：提前 1/3 天<br>创建于：2025-01-01
          <div class="card-actions"><button class="btn-sm btn-edit" onclick="event.stopPropagation();showEditDialog()">编辑</button><button class="btn-sm btn-delete" onclick="event.stopPropagation();showDeleteDialog('小宝贝生日')">删除</button></div>
        </div>
      </div>

      <div class="card holiday" onclick="toggleExpand(this)">
        <div class="card-top"><div class="card-info"><div class="card-name">🎉 情人节</div><div class="card-date">2026-02-14</div></div><div class="card-days">已过 145<small>天</small></div><div class="expand">▼</div></div>
        <div class="card-detail" style="display:none">
          提醒：提前 7 天<br>创建于：2025-01-01
          <div class="card-actions"><button class="btn-sm btn-edit" onclick="event.stopPropagation();showEditDialog()">编辑</button><button class="btn-sm btn-delete" onclick="event.stopPropagation();showDeleteDialog('情人节')">删除</button></div>
        </div>
      </div>
    </div>

    <!-- 空态 -->
    <div id="empty-content" class="empty" style="display:none">
      <div class="empty-icon">🎂</div>
      <p>还没有纪念日<br/>点击下方按钮添加第一个吧</p>
      <button class="btn btn-save" style="width:auto;padding:12px 24px" onclick="showAddDialog()">+ 添加纪念日</button>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" onclick="showAddDialog()">+</button>
</div>

<!-- TabBar -->
<div class="tabbar">
  <a class="tab"><span>🏠</span>首页</a>
  <a class="tab"><span>📸</span>拍照</a>
  <a class="tab active"><span>🎂</span>纪念</a>
  <a class="tab"><span>💝</span>愿望</a>
  <a class="tab"><span>⚙️</span>设置</a>
</div>

<!-- Add Dialog -->
<div class="overlay" id="add-overlay">
  <div class="dialog">
    <h3>💕 添加纪念日</h3>
    <div class="form-group"><label>名称 *</label><input type="text" placeholder="如：恋爱纪念日" maxlength="20"></div>
    <div class="form-group"><label>日期 *</label><input type="date" value="2024-07-01"></div>
    <div class="form-group"><label>类型 *</label>
      <div class="type-options">
        <button class="type-btn active" onclick="selectType(this)">💕 周年</button>
        <button class="type-btn" onclick="selectType(this)">🎂 生日</button>
        <button class="type-btn" onclick="selectType(this)">🎉 节日</button>
        <button class="type-btn" onclick="selectType(this)">🌟 其他</button>
      </div>
    </div>
    <div class="form-group"><label>备注</label><textarea placeholder="optional — 备注信息"></textarea></div>
    <div class="form-group"><label>提前提醒</label>
      <div class="checks">
        <label class="check"><input type="checkbox" class="checkbox" checked> 1 天前</label>
        <label class="check"><input type="checkbox" class="checkbox" checked> 3 天前</label>
        <label class="check"><input type="checkbox" class="checkbox"> 7 天前</label>
      </div>
    </div>
    <div class="dialog-actions">
      <button class="btn btn-cancel" onclick="closeOverlay('add-overlay')">取消</button>
      <button class="btn btn-save" onclick="saveAnniversary()">保存 💕</button>
    </div>
  </div>
</div>

<!-- Delete Dialog -->
<div class="overlay" id="delete-overlay">
  <div class="dialog" style="max-width:340px">
    <div style="text-align:center;font-size:48px;margin-bottom:12px">⚠️</div>
    <h3 style="justify-content:center;margin-bottom:12px" id="delete-text">确定要删除【恋爱纪念日】吗？</h3>
    <p style="text-align:center;font-size:14px:var(--text-secondary);margin-bottom:20px;color:var(--text-secondary)">删除后无法恢复</p>
    <div class="dialog-actions">
      <button class="btn btn-cancel" onclick="closeOverlay('delete-overlay')">取消</button>
      <button class="btn" style="background:#E8758A;color:#fff" onclick="confirmDeleteAnniversary()">确认删除</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
function toggleExpand(el){el.classList.toggle('expanded');const d=el.querySelector('.card-detail');d.style.display=d.style.display==='none'?'block':'none'}
function showAddDialog(){document.getElementById('add-overlay').classList.add('show')}
function showEditDialog(){document.getElementById('add-overlay').classList.add('show')}
function showDeleteDialog(name){document.getElementById('delete-text').textContent=`确定要删除【${name}】吗？`;document.getElementById('delete-overlay').classList.add('show')}
function closeOverlay(id){document.getElementById(id).classList.remove('show')}
function selectType(btn){document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
function saveAnniversary(){closeOverlay('add-overlay');showToast('已添加 💕')}
function confirmDeleteAnniversary(){closeOverlay('delete-overlay');showToast('已删除')}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function toggleTheme(){const h=document.documentElement;h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'':'dark')}
// Close overlay on backdrop click
['add-overlay','delete-overlay'].forEach(id=>{document.getElementById(id).addEventListener('click',e=>{if(e.target===e.currentTarget)closeOverlay(id)})});
</script>
</body>
</html>
