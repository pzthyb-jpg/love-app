<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F5F5F7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; font-src 'self'; media-src 'self' blob:;">
  <meta name="description" content="宝贝专属甜蜜空间 💕">
  <title>💕 小皮爱情助手</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='30' fill='%23E8758A'/%3E%3Ctext y='.85em' font-size='120' text-anchor='middle' x='90'%3E💕%3C/text%3E%3C/svg%3E">
  <style>
    .splash {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #F5F5F7;
      z-index: 9999; transition: opacity 0.4s ease;
    }
    .splash .heart { font-size: 48px; animation: heartBeat 1.2s ease-in-out infinite; }
    .splash p { color: #9CA3AF; font-size: 14px; margin-top: 16px; }
    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.2); }
      30% { transform: scale(1); }
      45% { transform: scale(1.15); }
      60% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div id="splash" class="splash">
    <div class="heart">💕</div>
    <p>小皮爱情助手加载中...</p>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var splash = document.getElementById('splash')
        if (splash) {
          splash.style.opacity = '0'
          setTimeout(function() { splash.style.display = 'none' }, 400)
        }
      }, 600)
    })
  </script>
</body>
</html>
