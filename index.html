<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#FFF5F9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <title>💕 小皮爱情助手</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='30' fill='%23FF6B9D'/%3E%3Ctext y='.85em' font-size='120' text-anchor='middle' x='90'%3E💕%3C/text%3E%3C/svg%3E">
  <style>
    /* 初始加载骨架屏 */
    .skeleton {
      display: flex;
      flex-direction: column;
      height: 100vh;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
      gap: 16px;
    }
    .skeleton .heart {
      font-size: 48px;
      animation: heartBeat 1.2s ease-in-out infinite;
    }
    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.2); }
      30% { transform: scale(1); }
      45% { transform: scale(1.15); }
      60% { transform: scale(1); }
    }
    .skeleton .loading-text {
      color: var(--color-text-secondary);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- 骨架屏 -->
  <div id="skeleton" class="skeleton">
    <div class="heart">💕</div>
    <div class="loading-text">小皮爱情助手加载中...</div>
  </div>

  <!-- 主应用容器 -->
  <div class="app-container" id="app" style="display:none;">
    <!-- 头部 -->
    <header class="app-header">
      <div class="deco-bar">
        <span class="deco-dot"></span>
        <span class="deco-dot" style="background:var(--color-secondary);opacity:0.4;"></span>
        <span class="deco-dot"></span>
      </div>
      <h1>💕 小皮爱情助手</h1>
      <div class="subtitle">专属于你的甜蜜小工具</div>
    </header>

    <!-- 页面主体 -->
    <main class="app-main" id="app-main">
      <!-- 拍照打卡页 -->
      <div class="page active" id="page-photo">
        <div id="photo-content"></div>
      </div>

      <!-- 午餐大转盘页 -->
      <div class="page" id="page-lunch">
        <div id="lunch-content"></div>
      </div>

      <!-- 愿望池页 -->
      <div class="page" id="page-wish">
        <div id="wish-content"></div>
      </div>
    </main>

    <!-- 底部导航 -->
    <nav class="app-nav">
      <button class="nav-item active" data-tab="photo">
        <span class="nav-icon">📸</span>
        <span class="nav-label">拍照打卡</span>
      </button>
      <button class="nav-item" data-tab="lunch">
        <span class="nav-icon">🍽️</span>
        <span class="nav-label">午餐转盘</span>
      </button>
      <button class="nav-item" data-tab="wish">
        <span class="nav-icon">✨</span>
        <span class="nav-label">愿望池</span>
      </button>
    </nav>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- 结果弹窗（大转盘结果） -->
  <div class="result-overlay" id="result-overlay">
    <div class="result-modal" id="result-modal"></div>
  </div>

  <!-- 隐藏的 canvas（用于拍照） -->
  <canvas id="camera-canvas" style="display:none;"></canvas>

  <!-- JS 模块 -->
  <script src="js/compliments.js"></script>
  <script src="js/photo.js"></script>
  <script src="js/lunch.js"></script>
  <script src="js/wish.js"></script>
  <script src="js/app.js"></script>

  <script>
    // 隐藏骨架屏，显示应用
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        document.getElementById('skeleton').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
      }, 600);
    });
  </script>
</body>
</html>
